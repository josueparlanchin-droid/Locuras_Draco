<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Melodie - Locuras Draco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cuerpo-vn">

    <div class="perfil-usuario-top">
        <span id="nombre-usuario-display">Cargando...</span>
        <img id="avatar-usuario-display" src="" alt="Tu Perfil">
    </div>

    <div class="contenedor-app-vn">
        
        <div class="cabecera-chat">
            <button onclick="window.location.href='inicio.html'" class="btn-volver">🔙 Volver al Inicio</button>
            <h2>Hablando con Melodie 🎤</h2>
        </div>

        <!-- El Escenario Central -->
        <div class="escena-vn">
            
            <!-- Personaje en grande al centro -->
            <img id="sprite-personaje" src="Melodie_encantada.png" alt="Melodie" class="sprite-centro">

            <!-- Caja de Diálogo Estilo Brawl Stars -->
            <div class="caja-dialogo-vn" id="caja-dialogo">
                <img id="icono-dialogo" src="Melodie_encantada.png" alt="Icono" class="icono-mini-dialogo">
                <p id="texto-dialogo">...</p>
            </div>

            <!-- Opciones del jugador -->
            <div class="zona-opciones-vn oculta" id="caja-opciones">
                <button class="btn-opcion-vn" id="opcion-1"></button>
                <button class="btn-opcion-vn" id="opcion-2"></button>
                <button class="btn-opcion-vn" id="opcion-3"></button>
            </div>

        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Cargar el perfil del usuario
            const nombreCompleto = localStorage.getItem('dracoNombre') || "Invitado";
            const avatar = localStorage.getItem('dracoAvatar');
            const primerNombre = nombreCompleto.split(' ')[0]; // Solo el primer nombre

            if (nombreCompleto && avatar) {
                document.getElementById('nombre-usuario-display').textContent = nombreCompleto;
                document.getElementById('avatar-usuario-display').src = avatar;
            }

            // Elementos de la pantalla
            const spritePersonaje = document.getElementById('sprite-personaje');
            const iconoDialogo = document.getElementById('icono-dialogo');
            const textoDialogo = document.getElementById('texto-dialogo');
            const cajaOpciones = document.getElementById('caja-opciones');

            // Función mágica para actualizar la escena (cambia la foto y el texto en el mismo lugar)
            function actualizarEscena(imagen, texto) {
                // Hacemos que la imagen se desvanezca rápido
                spritePersonaje.style.opacity = 0;
                
                setTimeout(() => {
                    // Cambiamos la foto gigante, el icono pequeñito y el texto
                    spritePersonaje.src = imagen;
                    iconoDialogo.src = imagen;
                    textoDialogo.innerHTML = texto;
                    // Hacemos que vuelva a aparecer
                    spritePersonaje.style.opacity = 1;
                }, 200);
            }

            // --- LA SECUENCIA DE DIÁLOGOS ---
            
            // 1. Inicia inmediatamente
            setTimeout(() => {
                actualizarEscena("Melodie_encantada.png", "!!~AY UN GUSTO LINDO!!. Me llamo Melodie");
            }, 300);

            // 2. A los 3.5 segundos cambia a la segunda frase
            setTimeout(() => {
                actualizarEscena("Melodie_preocupada.png", "Aunque Locuras Draco y sus amigos me llaman Melodie Aesthetic o Coreana pero... *bosteza*");
            }, 3500);

            // 3. A los 7 segundos cambia a la tercera frase y muestra las opciones
            setTimeout(() => {
                actualizarEscena("Melodie_normal.png", "Y bien lindo, ¿qué quieres saber de mí?");
                
                // Mostramos los botones un segundito después
                setTimeout(() => {
                    document.getElementById('opcion-1').innerHTML = `<i>*Sonrojado*</i> E-eh... sí, hola Melodie. Mucho gusto, me llamo <b>${primerNombre}</b> y quería saber un poco de tus gustos musicales, jeje. Si no te molesta, claro.`;
                    
                    document.getElementById('opcion-2').innerHTML = `<i>*La mira con admiración*</i> ¡¡Melodie, un gusto!! Me llamo <b>${primerNombre}</b> y, bueno... quería saber si podríamos tener una pequeña cita para comer.`;
                    
                    document.getElementById('opcion-3').innerHTML = `<i>*Un poco nervioso*</i> Hola Melodie, mucho gusto. Me llamo <b>${primerNombre}</b> y quería saber más cosas sobre ti... si no te molesta.`;
                    
                    cajaOpciones.classList.remove('oculta');
                }, 1000);

            }, 7500);
        });
    </script>
</body>
</html>
