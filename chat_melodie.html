<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Melodie - Locuras Draco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cuerpo-vn">

    <div class="perfil-usuario-top">
        <span id="nombre-usuario-display">Cargando...</span>
        <img id="avatar-usuario-display" src="" alt="Tu Perfil">
    </div>

    <div class="contenedor-app-vn">
        
        <div class="cabecera-chat">
            <button onclick="window.location.href='inicio.html'" class="btn-volver">🔙 Volver al Inicio</button>
            <h2>Hablando con Melodie 🎤</h2>
        </div>

        <!-- El Escenario Central -->
        <div class="escena-vn">
            
            <!-- Personaje en grande al centro -->
            <img id="sprite-personaje" src="Melodie_Encantada.png" alt="Melodie" class="sprite-centro">

            <!-- Caja de Diálogo Estilo Brawl Stars -->
            <div class="caja-dialogo-vn" id="caja-dialogo">
                <img id="icono-dialogo" src="Melodie_Encantada.png" alt="Icono" class="icono-mini-dialogo">
                <p id="texto-dialogo">...</p>
            </div>

            <!-- Opciones del jugador -->
            <div class="zona-opciones-vn oculta" id="caja-opciones">
                <button class="btn-opcion-vn" id="opcion-1"></button>
                <button class="btn-opcion-vn" id="opcion-2"></button>
                <button class="btn-opcion-vn" id="opcion-3"></button>
            </div>

        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Cargar el perfil del usuario
            const nombreCompleto = localStorage.getItem('dracoNombre') || "Invitado";
            const avatar = localStorage.getItem('dracoAvatar');
            const primerNombre = nombreCompleto.split(' ')[0]; // Solo el primer nombre

            if (nombreCompleto && avatar) {
                document.getElementById('nombre-usuario-display').textContent = nombreCompleto;
                document.getElementById('avatar-usuario-display').src = avatar;
            }

            // Elementos de la pantalla
            const spritePersonaje = document.getElementById('sprite-personaje');
            const iconoDialogo = document.getElementById('icono-dialogo');
            const textoDialogo = document.getElementById('texto-dialogo');
            const cajaOpciones = document.getElementById('caja-opciones');

            // Función mágica para actualizar la escena (cambia la foto y el texto en el mismo lugar)
            function actualizarEscena(imagen, texto) {
                // Hacemos que la imagen se desvanezca rápido
                spritePersonaje.style.opacity = 0;
                
                setTimeout(() => {
                    // Cambiamos la foto gigante, el icono pequeñito y el texto
                    spritePersonaje.src = imagen;
                    iconoDialogo.src = imagen;
                    textoDialogo.innerHTML = texto;
                    // Hacemos que vuelva a aparecer
                    spritePersonaje.style.opacity = 1;
                }, 200);
            }

// --- LA SECUENCIA DE DIÁLOGOS INICIAL ---
            
            // 1. Inicia inmediatamente
            setTimeout(() => {
                actualizarEscena("Melodie_Encantada.png", "!!~AY UN GUSTO LINDO!!. Me llamo Melodie");
            }, 300);

            // 2. A los 3.5 segundos cambia a la segunda frase
            setTimeout(() => {
                actualizarEscena("Melodie_Preocupada (2).jpeg", "Aunque Locuras Draco y sus amigos me llaman Melodie Aesthetic o Coreana pero... *bosteza*");
            }, 3500);

            // 3. A los 7 segundos cambia a la tercera frase y muestra las opciones iniciales
            setTimeout(() => {
                actualizarEscena("Melodie_normal (2).jpeg", "Y bien lindo, ¿qué quieres saber de mí?");
                
                // Mostramos los botones de la PRIMERA decisión
                setTimeout(() => {
                    const btn1 = document.getElementById('opcion-1');
                    const btn2 = document.getElementById('opcion-2');
                    const btn3 = document.getElementById('opcion-3');

                    btn1.innerHTML = `<i>*Sonrojado*</i> E-eh... sí, hola Melodie. Mucho gusto, me llamo <b>${primerNombre}</b> y quería saber un poco de tus gustos musicales, jeje. Si no te molesta, claro.`;
                    btn2.innerHTML = `<i>*La mira con admiración*</i> ¡¡Melodie, un gusto!! Me llamo <b>${primerNombre}</b> y, bueno... quería saber si podríamos tener una pequeña cita para comer.`;
                    btn3.innerHTML = `<i>*Un poco nervioso*</i> Hola Melodie, mucho gusto. Me llamo <b>${primerNombre}</b> y quería saber más cosas sobre ti... si no te molesta.`;
                    
                    cajaOpciones.classList.remove('oculta');

// ==========================================
                    // ¿QUÉ PASA CUANDO EL USUARIO ELIGE LA OPCIÓN 1? (PRIMERA RONDA)
                    // ==========================================
                    btn1.onclick = function() {
                        cajaOpciones.classList.add('oculta');
                        
                        actualizarEscena("Melodie_apuntando.jpeg", `¡Claro, <b>${primerNombre}</b>! Yo no tengo problema en hablarle a mis fans sobre mis gustos musicales.`);
                        
                        setTimeout(() => {
                            actualizarEscena("Melodie_interesada.jpeg", "Bueno, aunque la mayoría ya sabe cuáles son mis gustos musicales favoritos, jiji... Pero bueno, cariño, ¿qué te gustaría saber?");
                            
                            setTimeout(() => {
                                btn1.innerHTML = `Yo no lo sé, Melodie, por eso pregunto. ¿Cuál es tu género musical favorito? jeje.`;
                                btn2.innerHTML = `Déjame adivinar... te gusta el K-pop, ¿verdad?`;
                                
                                btn3.style.display = "none"; // Ocultamos el 3er botón
                                
                                // ==========================================
                                // ¿QUÉ PASA CUANDO ELIGE LA OPCIÓN 1 EN LA SEGUNDA RONDA?
                                // ==========================================
                                btn1.onclick = function() {
                                    cajaOpciones.classList.add('oculta');
                                    
                                    // 1. Melodie se indigna inmediatamente
                                    // OJO: Cambia el nombre aquí por el de tu PNG sin fondo
                                    actualizarEscena("Melodie_sorprendida.jpeg", "¡¿Cómo es posible que sepas mi nombre pero no sepas mi género musical favorito, si es con el que todos me han estado escuchando a lo largo de mi carrera?!");
                                    
                                    // 2. A los 5 segundos, se pone desanimada
                                    setTimeout(() => {
                                        // OJO: Cambia el nombre aquí por el de tu PNG sin fondo
                                        actualizarEscena("Melodie_desanimada.jpeg", "<i>*Lo mira un poco desanimada*</i> Mi género musical favorito es el K-pop.");
                                        
                                        // 3. A los 4 segundos (9 seg en total), dice la última frase con la misma imagen
                                        setTimeout(() => {
                                            textoDialogo.innerHTML = "Pero de nada me sirve decírtelo ahora, si apenas conoces mi nombre. Vaya, deberás conocerme más de lo habitual... aunque no sé si darte el tiempo, ya que tengo cosas que hacer. <i>*Un poco desanimada*</i>";
                                            // Nota: Aquí solo cambié el texto (textoDialogo.innerHTML) para no hacer el parpadeo de la imagen, ya que es la misma pose.
                                        }, 4000);

                                    }, 5000);
                                };

                                // Dejamos la opción 2 pendiente para después
                                btn2.onclick = function() { console.log("Próximamente K-Pop..."); };

                                cajaOpciones.classList.remove('oculta');
                            }, 1000);

                        }, 4000); 
                    };

                    // Acciones temporales para los botones 2 y 3 originales (para que no den error)
                    btn2.onclick = function() { alert("¡La ruta de la cita se está construyendo! Vuelve a intentar la Opción 1."); };
                    btn3.onclick = function() { alert("¡La ruta de curiosidades se está construyendo! Vuelve a intentar la Opción 1."); };

                }, 1000);

            }, 7500);
        });
    </script>
</body>
</html>
