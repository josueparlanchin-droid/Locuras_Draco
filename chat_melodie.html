<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Melodie - Locuras Draco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cuerpo-vn">

    <div class="perfil-usuario-top">
        <span id="nombre-usuario-display">Cargando...</span>
        <img id="avatar-usuario-display" src="" alt="Tu Perfil">
    </div>

    <div class="contenedor-app-vn">
        
        <div class="cabecera-chat">
            <button onclick="window.location.href='inicio.html'" class="btn-volver">🔙 Volver al Inicio</button>
            <h2>Hablando con Melodie 🎤</h2>
        </div>

        <!-- El Escenario Central (Ahora también recibe los clics) -->
        <div class="escena-vn">
            
            <!-- Personaje en grande al centro -->
            <img id="sprite-personaje" src="Melodie_Encantada.png" alt="Melodie" class="sprite-centro">

            <!-- Caja de Diálogo Estilo Brawl Stars -->
            <div class="caja-dialogo-vn" id="caja-dialogo">
                <img id="icono-dialogo" src="Melodie_Encantada.png" alt="Icono" class="icono-mini-dialogo">
                <p id="texto-dialogo">...</p>
                <!-- Un pequeño indicador visual para que sepan que pueden hacer clic -->
                <span style="position:absolute; right:15px; bottom:10px; color:#fff; font-size:0.8rem; opacity:0.7;">Click para continuar ▶</span>
            </div>

            <!-- Opciones del jugador -->
            <div class="zona-opciones-vn oculta" id="caja-opciones">
                <button class="btn-opcion-vn" id="opcion-1"></button>
                <button class="btn-opcion-vn" id="opcion-2"></button>
                <button class="btn-opcion-vn" id="opcion-3"></button>
            </div>

        </div>

    </div>

<script>
        document.addEventListener("DOMContentLoaded", () => {
            // Cargar el perfil del usuario (Usamos Draco como respaldo)
            const nombreCompleto = localStorage.getItem('dracoNombre') || "Draco";
            const avatar = localStorage.getItem('dracoAvatar');
            const primerNombre = nombreCompleto.split(' ')[0]; 

            if (nombreCompleto && avatar) {
                document.getElementById('nombre-usuario-display').textContent = nombreCompleto;
                document.getElementById('avatar-usuario-display').src = avatar;
            }

            // Elementos de la pantalla
            const spritePersonaje = document.getElementById('sprite-personaje');
            const iconoDialogo = document.getElementById('icono-dialogo');
            const textoDialogo = document.getElementById('texto-dialogo');
            const cajaOpciones = document.getElementById('caja-opciones');
            const btn1 = document.getElementById('opcion-1');
            const btn2 = document.getElementById('opcion-2');
            const btn3 = document.getElementById('opcion-3');

            // --- NUEVO SISTEMA DE DIÁLOGOS POR CLIC ---
            let colaDialogos = [];
            let esperandoOpciones = false;

            function actualizarEscena(imagen, texto) {
                spritePersonaje.style.opacity = 0;
                setTimeout(() => {
                    spritePersonaje.src = imagen;
                    iconoDialogo.src = imagen;
                    textoDialogo.innerHTML = texto;
                    spritePersonaje.style.opacity = 1;
                }, 150); // Transición rápida para clics
            }

            // Función central que avanza la historia
            function avanzarDialogo() {
                // Si no hay diálogos en cola o estamos esperando que elijan un botón, ignoramos el clic
                if (colaDialogos.length === 0 || esperandoOpciones) return;

                // Sacamos el primer diálogo de la lista
                const actual = colaDialogos.shift();
                actualizarEscena(actual.img, actual.txt);

                // Si este diálogo activa botones, los mostramos y bloqueamos el avance por clic
                if (actual.showOptions) {
                    esperandoOpciones = true;
                    setTimeout(() => mostrarOpciones(actual.showOptions), 600); // Pequeña pausa antes de mostrar botones
                }

                // Si este diálogo es un Final, mostramos el botón de volver
                if (actual.esFinal) {
                    esperandoOpciones = true;
                    setTimeout(() => {
                        btn1.innerHTML = "🔙 Volver al Menú Principal";
                        btn2.style.display = "none";
                        btn3.style.display = "none";
                        btn1.onclick = () => window.location.href = "inicio.html";
                        cajaOpciones.classList.remove('oculta');
                    }, 1000);
                }
            }

            // Detectamos los clics en toda la pantalla
            document.body.addEventListener('click', (evento) => {
                // Evitar avanzar si hacen clic en un botón, en las opciones, o en la barra superior
                if (evento.target.tagName.toLowerCase() === 'button' || evento.target.closest('.zona-opciones-vn') || evento.target.closest('.cabecera-chat')) {
                    return;
                }
                avanzarDialogo();
            });

            // Administrador de botones según la fase
            function mostrarOpciones(fase) {
                if (fase === 1) {
                    btn1.innerHTML = `<i>*Sonrojado*</i> E-eh... sí, hola Melodie. Mucho gusto, me llamo <b>${primerNombre}</b> y quería saber un poco de tus gustos musicales, jeje. Si no te molesta, claro.`;
                    btn2.innerHTML = `<i>*La mira con admiración*</i> ¡¡Melodie, un gusto!! Me llamo <b>${primerNombre}</b> y, bueno... quería saber si podríamos tener una pequeña cita para comer.`;
                    btn3.innerHTML = `<i>*Un poco nervioso*</i> Hola Melodie, mucho gusto. Me llamo <b>${primerNombre}</b> y quería saber más cosas sobre ti... si no te molesta.`;
                    btn3.style.display = "block";
                    
                    btn1.onclick = () => { iniciarFase2_Opcion1(); };
                    btn2.onclick = () => { alert("¡Ruta cita en construcción!"); };
                    btn3.onclick = () => { alert("¡Ruta curiosidad en construcción!"); };
                } 
                else if (fase === 2) {
                    btn1.innerHTML = `Yo no lo sé, Melodie, por eso pregunto. ¿Cuál es tu género musical favorito? jeje.`;
                    btn2.innerHTML = `Déjame adivinar... te gusta el K-pop, ¿verdad?`;
                    btn3.style.display = "none";

                    btn1.onclick = () => { iniciarFase3_Opcion1(); };
                    btn2.onclick = () => { alert("¡Ruta K-Pop en construcción!"); };
                }
                else if (fase === 3) {
                    btn1.innerHTML = `Perdón por no saber y desanimarte, Melodie. No fue mi intención, es que soy nuevo en tu comunidad y...`;
                    btn2.innerHTML = `Ay, no pensé que te llegarías a desanimar por no saber tu gusto musical, linda.`;
                    btn3.innerHTML = `Ah, lo siento Melodie, era solo para saber, jeje. Bueno, hablamos otro día, chao.`;
                    btn3.style.display = "block";

                    btn1.onclick = () => { iniciarFinalRaro(); };
                    btn2.onclick = () => { iniciarFase4_Opcion2(); }; // <-- AQUÍ CONECTAMOS LA NUEVA RUTA
                    btn3.onclick = () => { iniciarFinalMalo(); };
                }
                else if (fase === 4) {
                    // Nuevas opciones para el ego de Melodie
                    btn1.innerHTML = `Ay, Melodie, está bien, discúlpame, ahora lo sé... dijiste que tienes cosas que hacer, así que bueno, nos vemos para la próxima, cuídate.`;
                    btn2.innerHTML = `Vaya, siendo una de las idols más famosas, sí que tienes el ego por las nubes al igual que la Canon. Así que chao, loca.`;
                    btn3.style.display = "none";

                    btn1.onclick = () => { alert("¡Ruta de disculpa en construcción!"); };
                    btn2.onclick = () => { iniciarFinalPeor(); }; // <-- AQUÍ CONECTAMOS EL PEOR FINAL
                }

                cajaOpciones.classList.remove('oculta');
            }

            // --- CARGADOR DE RUTAS (HISTORIA) ---

            function iniciarFase1() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_Encantada.png", txt: "!!~AY UN GUSTO LINDO!!. Me llamo Melodie" },
                    { img: "Melodie_Preocupada (2).jpeg", txt: "Aunque Locuras Draco y sus amigos me llaman Melodie Aesthetic o Coreana pero... *bosteza*" },
                    { img: "Melodie_normal (2).jpeg", txt: "Y bien lindo, ¿qué quieres saber de mí?", showOptions: 1 }
                ];
                avanzarDialogo();
            }

            function iniciarFase2_Opcion1() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_apuntando.jpeg", txt: `¡Claro, <b>${primerNombre}</b>! Yo no tengo problema en hablarle a mis fans sobre mis gustos musicales.` },
                    { img: "Melodie_interesada.jpeg", txt: "Bueno, aunque la mayoría ya sabe cuáles son mis gustos musicales favoritos, jiji... Pero bueno, cariño, ¿qué te gustaría saber?", showOptions: 2 }
                ];
                avanzarDialogo();
            }

            function iniciarFase3_Opcion1() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_sorprendida.jpeg", txt: "¡¿Cómo es posible que sepas mi nombre pero no sepas mi género musical favorito, si es con el que todos me han estado escuchando a lo largo de mi carrera?!" },
                    { img: "Melodie_desanimada.jpeg", txt: "<i>*Lo mira un poco desanimada*</i> Mi género musical favorito es el K-pop." },
                    { img: "Melodie_desanimada.jpeg", txt: "Pero de nada me sirve decírtelo ahora, si apenas conoces mi nombre. Vaya, deberás conocerme más de lo habitual... aunque no sé si darte el tiempo, ya que tengo cosas que hacer. <i>*Un poco desanimada*</i>", showOptions: 3 }
                ];
                avanzarDialogo();
            }

            // === LA NUEVA RUTA DEL EGO ===
            function iniciarFase4_Opcion2() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "TU_IMAGEN_MELODIE_OFENDIDA.png", txt: "Uy, sí, ¿cómo no desanimarme, cariño?" },
                    { img: "TU_IMAGEN_MELODIE_ORGULLOSA.png", txt: "Soy una de las idols más famosas y más perfectas de este universo." },
                    { img: "TU_IMAGEN_MELODIE_ENOJADA.png", txt: "Así que, ¿cómo no ofenderme por algo muy básico como no saber mi gusto musical?", showOptions: 4 }
                ];
                avanzarDialogo();
            }

            // === LOS FINALES ===

            function iniciarFinalRaro() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_normal (2).jpeg", txt: "Uy cariño, no pasa nada. Al ser nuevo no siempre es fácil conectar con la comunidad. Aunque ya es demasiado tarde para poder explicarte todo sobre mí, así que mejor vuelve otro día." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<i>*Melodie se fue a descansar*</i>, así que decides marcharte y pensar en volver otro día." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "Tuviste una charla bastante rara con Melodie.", esFinal: true }
                ];
                avanzarDialogo();
            }

            function iniciarFinalMalo() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<i>*Decides marcharte...*</i>" },
                    { img: "Melodie_desanimada.jpeg", txt: "...pero Melodie no te deja de observar por tal ignorancia que le has hecho." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "Has tenido una charla mala.", esFinal: true }
                ];
                avanzarDialogo();
            }

            function iniciarFinalPeor() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "TU_IMAGEN_MELODIE_FURIOSA_1.png", txt: "¡¿Cómo se te ocurre tratarme así?!" },
                    { img: "TU_IMAGEN_MELODIE_FURIOSA_2.png", txt: "Ojalá no vuelvas para no volver a ver esa cara de pend***." },
                    { img: "TU_IMAGEN_MELODIE_FURIOSA_3.png", txt: "¡CHAO!" },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "Tuviste una de las peores conversaciones con Melodie.", esFinal: true }
                ];
                avanzarDialogo();
            }

            // Arrancamos el juego automáticamente
            iniciarFase1();
        });
    </script>
</body>
</html>
