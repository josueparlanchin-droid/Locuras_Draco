<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Melodie - Locuras Draco</title>
    <link rel="stylesheet" href="style.css">
    <!-- Estilo extra para soportar hasta 5 botones sin que se rompa el diseño -->
    <style>
        .zona-opciones-vn {
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-opcion-vn {
            min-width: 45%; /* Hace que si hay más de 3, se pongan en dos filas */
        }
    </style>
</head>
<body class="cuerpo-vn">

    <div class="perfil-usuario-top">
        <span id="nombre-usuario-display">Cargando...</span>
        <img id="avatar-usuario-display" src="" alt="Tu Perfil">
    </div>

    <div class="contenedor-app-vn">
        
        <div class="cabecera-chat">
            <button onclick="window.location.href='inicio.html'" class="btn-volver">🔙 Volver al Inicio</button>
            <h2>Hablando con Melodie 🎤</h2>
        </div>

        <!-- El Escenario Central -->
        <div class="escena-vn">
            
            <img id="sprite-personaje" src="Melodie_Encantada.png" alt="Melodie" class="sprite-centro">

            <div class="caja-dialogo-vn" id="caja-dialogo">
                <img id="icono-dialogo" src="Melodie_Encantada.png" alt="Icono" class="icono-mini-dialogo">
                <p id="texto-dialogo">...</p>
                <span style="position:absolute; right:15px; bottom:10px; color:#fff; font-size:0.8rem; opacity:0.7;">Click para continuar ▶</span>
            </div>

            <!-- Opciones del jugador (AHORA SOPORTA HASTA 5 BOTONES) -->
            <div class="zona-opciones-vn oculta" id="caja-opciones">
                <button class="btn-opcion-vn" id="opcion-1"></button>
                <button class="btn-opcion-vn" id="opcion-2"></button>
                <button class="btn-opcion-vn" id="opcion-3"></button>
                <button class="btn-opcion-vn" id="opcion-4"></button>
                <button class="btn-opcion-vn" id="opcion-5"></button>
            </div>

        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const nombreCompleto = localStorage.getItem('dracoNombre') || "Draco";
            const avatar = localStorage.getItem('dracoAvatar');
            const primerNombre = nombreCompleto.split(' ')[0]; 

            if (nombreCompleto && avatar) {
                document.getElementById('nombre-usuario-display').textContent = nombreCompleto;
                document.getElementById('avatar-usuario-display').src = avatar;
            }

            const spritePersonaje = document.getElementById('sprite-personaje');
            const iconoDialogo = document.getElementById('icono-dialogo');
            const textoDialogo = document.getElementById('texto-dialogo');
            const cajaOpciones = document.getElementById('caja-opciones');
            
            const btn1 = document.getElementById('opcion-1');
            const btn2 = document.getElementById('opcion-2');
            const btn3 = document.getElementById('opcion-3');
            const btn4 = document.getElementById('opcion-4');
            const btn5 = document.getElementById('opcion-5');

            let colaDialogos = [];
            let esperandoOpciones = false;

            function actualizarEscena(imagen, texto) {
                spritePersonaje.style.opacity = 0;
                setTimeout(() => {
                    spritePersonaje.src = imagen;
                    iconoDialogo.src = imagen;
                    textoDialogo.innerHTML = texto;
                    spritePersonaje.style.opacity = 1;
                }, 150); 
            }

            function avanzarDialogo() {
                if (colaDialogos.length === 0 || esperandoOpciones) return;

                const actual = colaDialogos.shift();
                actualizarEscena(actual.img, actual.txt);

                if (actual.showOptions) {
                    esperandoOpciones = true;
                    setTimeout(() => mostrarOpciones(actual.showOptions), 600); 
                }

                if (actual.esFinal) {
                    esperandoOpciones = true;
                    setTimeout(() => {
                        // Ocultamos todos los botones extras y dejamos solo el de volver
                        btn1.innerHTML = "🔙 Volver al Menú Principal";
                        btn1.style.display = "block";
                        btn2.style.display = "none";
                        btn3.style.display = "none";
                        btn4.style.display = "none";
                        btn5.style.display = "none";
                        btn1.onclick = () => window.location.href = "inicio.html";
                        cajaOpciones.classList.remove('oculta');
                    }, 1000);
                }
            }

            document.body.addEventListener('click', (evento) => {
                if (evento.target.tagName.toLowerCase() === 'button' || evento.target.closest('.zona-opciones-vn') || evento.target.closest('.cabecera-chat')) {
                    return;
                }
                avanzarDialogo();
            });

            // Oculta todos los botones para prender solo los necesarios
            function resetBotones() {
                btn1.style.display = "none";
                btn2.style.display = "none";
                btn3.style.display = "none";
                btn4.style.display = "none";
                btn5.style.display = "none";
            }

            // Administrador de botones según la fase
            function mostrarOpciones(fase) {
                resetBotones(); // Limpiamos antes de mostrar

                if (fase === 1) {
                    btn1.innerHTML = `<i>*La mira con admiración*</i> ¡Melodie, un gusto! Me llamo <b>${primerNombre}</b> y, bueno... quería invitarte a salir a comer conmigo, si es que no te molesta.`;
                    btn2.innerHTML = `<i>*Un poco nervioso*</i> Hola Melodie, mucho gusto. Me llamo <b>${primerNombre}</b> y quería saber más cosas sobre ti... si no te molesta.`;
                    btn1.style.display = "block";
                    btn2.style.display = "block";
                    
                    btn1.onclick = () => { iniciarRutaCita(); }; 
                    btn2.onclick = () => { iniciarRutaCuriosidad(); }; // <--- CONECTADO CON LA NUEVA RUTA
                } 
                else if (fase === 5) {
                    btn1.innerHTML = `O sea, no es lo que piensas, Melodie. Lo que pasa es que quiero aprender muchas cosas de ti.`;
                    btn2.innerHTML = `Bueno, yo sé que recién nos conocemos, pero eso no me impide invitar a una chica tan linda como tú.`;
                    btn3.innerHTML = `Wow, wow, ¿en qué estás pensando, coreana? Si solo es una invitación para salir a comer tú y yo con mis amigos.`;
                    btn1.style.display = "block"; btn2.style.display = "block"; btn3.style.display = "block";

                    btn1.onclick = () => { iniciarCita_Aprender(); };
                    btn2.onclick = () => { iniciarCita_Coquetear(); };
                    btn3.onclick = () => { iniciarCita_Coreana(); };
                }
                else if (fase === 6) {
                    btn1.innerHTML = `Pero vaya, si yo he oído a alguien que siempre te llama así y nunca le dices nada... pero parece que me olvidé de su nombre.`;
                    btn2.innerHTML = `Pues lo siento, coreana, pero es divertido llamarte así, jaja. Así que bien, ¿aceptas o no aceptas?`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { alert("¡Ruta 'Me olvidé de su nombre' en construcción!"); };
                    btn2.onclick = () => { iniciarCoreana_NoAcepto(); };
                }
                else if (fase === 7) {
                    btn1.innerHTML = `<i>*La interrumpes*</i> Va a ir mi mejor amigo, Locuras Draco.`;
                    btn2.innerHTML = `Pues entonces vete a la mie*** y hasta nunca. -1 seguidor.`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { alert("¡Ruta Locuras Draco en construcción!"); };
                    btn2.onclick = () => { iniciarFinal_Insulto(); }; 
                }
                else if (fase === 8) {
                    btn1.innerHTML = `Después de almorzar, quiero aprender a bailar contigo.`;
                    btn2.innerHTML = `Después de almorzar, quiero invitarte a mi casa para poder jugar unas partidas de Brawl Stars.`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarAprender_Bailar(); }; 
                    btn2.onclick = () => { iniciarAprender_BrawlStars(); }; 
                }
                else if (fase === 9) {
                    btn1.innerHTML = `Sí, después de almorzar, quiero que me enseñes unos pasos.`;
                    btn2.innerHTML = `Sí, a bailar contigo, Melodie. Es mi mayor sueño.`; 
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarAprender_Pasos(); }; 
                    btn2.onclick = () => { iniciarAprender_Sueno(); }; 
                }
                else if (fase === 10) {
                    btn1.innerHTML = `<i>*Lo dices entre una gran tristeza*</i> Perdóname Melodie, no calculé bien el tiempo...`;
                    btn2.innerHTML = `Ay Melodie, perdón, nunca me imaginé que pesaras mucho.`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarCaida_Perdon(); }; 
                    btn2.onclick = () => { iniciarCaida_Pesada(); }; 
                }
                else if (fase === 11) {
                    btn1.innerHTML = `(Ruta 1 en construcción)`;
                    btn2.innerHTML = `(Ruta 2 en construcción)`;
                    btn3.innerHTML = `(Ruta 3 en construcción)`;
                    btn1.style.display = "block"; btn2.style.display = "block"; btn3.style.display = "block";

                    btn1.onclick = () => { alert("¡Casilla 1 de Brawl Stars en construcción!"); }; 
                    btn2.onclick = () => { alert("¡Casilla 2 de Brawl Stars en construcción!"); }; 
                    btn3.onclick = () => { alert("¡Casilla 3 de Brawl Stars en construcción!"); }; 
                }
                // ==========================================
                // NUEVAS FASES DE LA RUTA CURIOSIDAD
                // ==========================================
                else if (fase === 21) {
                    // 4 Casillas de curiosidad
                    btn1.innerHTML = `Melodie, ¿tienes algún otro género musical favorito aparte del K-pop?`;
                    btn2.innerHTML = `Melodie, ¿tú sientes amor o deseo hacia alguien?`;
                    btn3.innerHTML = `Melodie, tú eres surcoreana pero veo que cuando estás con todos tus compatriotas no te sientes cómoda, ¿por qué eres así?`;
                    btn4.innerHTML = `Melodie, ¿por qué te gusta que te llamemos así en vez de Melodie Aesthetic o Asiática?`;
                    btn1.style.display = "block"; btn2.style.display = "block"; btn3.style.display = "block"; btn4.style.display = "block";

                    btn1.onclick = () => { iniciarCuriosidad_Genero(); }; 
                    btn2.onclick = () => { iniciarCuriosidad_Amor(); }; 
                    btn3.onclick = () => { alert("¡Ruta 'Compatriotas' en construcción!"); }; 
                    btn4.onclick = () => { alert("¡Ruta 'Aesthetic/Asiática' en construcción!"); }; 
                }
                else if (fase === 22) {
                    btn1.innerHTML = `<i>*Sorprendido*</i> Vaya, quién lo habría imaginado, una idol escuchando Rock. Me sorprende la verdad.`;
                    btn2.innerHTML = `<i>*Sorprendido*</i> Wow, no sabía la verdad que escuchabas Rock, ahora entiendo por qué te gusta ese tal hechicero del que todos hablan.`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarGenero_Rock(); }; 
                    btn2.onclick = () => { iniciarGenero_Hechicero(); }; 
                }
                else if (fase === 23) {
                    btn1.innerHTML = `Tranquila, Melodie, no le diré a nadie para no manchar tu hermosa imagen.`;
                    btn2.innerHTML = `(Ruta 2 en construcción - Casilla pendiente)`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarRock_Secreto(); }; 
                    btn2.onclick = () => { alert("¡Ruta 2 pendiente en construcción!"); }; 
                }
                else if (fase === 24) {
                    btn1.innerHTML = `¿Locuras Draco? Él es mi mejor amigo, ¿él te hizo algo alguna vez?`;
                    btn2.innerHTML = `¡¡Locuras Draco!! ¿Tienes alguna especie de relación con él?`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarSecreto_DracoAmigo(); }; 
                    btn2.onclick = () => { alert("¡Ruta 'Relación con Draco' en construcción!"); }; 
                }
                else if (fase === 25) {
                    btn1.innerHTML = `Wow, así que entonces estás enamorada de él.`;
                    btn2.innerHTML = `Jaja, gracias por decírmelo, Melodie. <i>*Corres del lugar para decirle a Ziggy*</i>`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarHechicero_Enamorada(); }; 
                    btn2.onclick = () => { iniciarHechicero_Chisme(); }; 
                }
                else if (fase === 26) {
                    btn1.innerHTML = `Oooh vale. ¿Y no me dejarías adivinarlo, Melodie?`;
                    btn2.innerHTML = `Qué interesante, ¿no me podrías dar más pistas, Melodie?`;
                    btn1.style.display = "block"; btn2.style.display = "block";

                    btn1.onclick = () => { iniciarAmor_Adivinar(); }; 
                    btn2.onclick = () => { alert("¡Ruta 'Más pistas' en construcción!"); }; 
                }
                else if (fase === 27) {
                    // AQUÍ ESTÁN LAS 5 CASILLAS PARA ADIVINAR
                    btn1.innerHTML = `¿Lawrie?`;
                    btn2.innerHTML = `¿Finx?`;
                    btn3.innerHTML = `¿Chester?`;
                    btn4.innerHTML = `¿Locuras Draco?`;
                    btn5.innerHTML = `¿Fang?`;
                    btn1.style.display = "block"; btn2.style.display = "block"; btn3.style.display = "block"; btn4.style.display = "block"; btn5.style.display = "block";

                    btn1.onclick = () => { iniciarAdivinar_Lawrie(); }; 
                    btn2.onclick = () => { iniciarAdivinar_Finx(); }; 
                    btn3.onclick = () => { iniciarAdivinar_Chester(); }; 
                    btn4.onclick = () => { iniciarAdivinar_Draco(); }; 
                    btn5.onclick = () => { iniciarAdivinar_Fang(); }; 
                }
                else if (fase === 28) {
                    btn1.innerHTML = `Wow, qué locura que ames a Locuras Draco, él es mi amigo... dime, ¿qué le ves de bueno a él?`;
                    btn2.innerHTML = `Eso es increíble, Melodie. Sé que vas a lograr conquistarlo algún día. Igual quería saber si sabes todas las cosas sobre él.`;
                    btn3.innerHTML = `<i>*Sorprendido*</i> ¡¡Locuras Draco!! Yo lo conozco, aunque no sabía que lo amabas mucho. Pensé que después de los acontecimientos de 'Por tu amor Draco' dejaste de amarlo tanto y solo fueron amigos.`;
                    btn1.style.display = "block"; btn2.style.display = "block"; btn3.style.display = "block";

                    btn1.onclick = () => { iniciarDraco_Amigo(); }; 
                    btn2.onclick = () => { iniciarDraco_Conquistar(); }; 
                    btn3.onclick = () => { alert("¡Ruta 'Sucesos del cómic' en construcción!"); }; 
                }
                else if (fase === 29) {
                    btn1.innerHTML = `(Casilla 1 de Draco en construcción)`;
                    btn2.innerHTML = `(Casilla 2 de Draco en construcción)`;
                    btn3.innerHTML = `(Casilla 3 de Draco en construcción)`;
                    btn1.style.display = "block"; btn2.style.display = "block"; btn3.style.display = "block";

                    btn1.onclick = () => { alert("En construcción!"); }; 
                    btn2.onclick = () => { alert("En construcción!"); }; 
                    btn3.onclick = () => { alert("En construcción!"); }; 
                }

                cajaOpciones.classList.remove('oculta');
            }

            // --- CARGADOR DE RUTAS (HISTORIA) ---

            function iniciarFase1() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_Encantada.png", txt: "!!~AY UN GUSTO LINDO!!. Me llamo Melodie" },
                    { img: "Melodie_Preocupada (2).jpeg", txt: "Aunque Locuras Draco y sus amigos me llaman Melodie Aesthetic o Coreana pero... *bosteza*" },
                    { img: "Melodie_normal (2).jpeg", txt: "Y bien lindo, ¿qué quieres saber de mí?", showOptions: 1 }
                ];
                avanzarDialogo();
            }

            // ==========================================
            // RUTAS DE LA CITA Y EL BAILE (YA ESTABLECIDAS)
            // ==========================================
            function iniciarRutaCita() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_interesada.jpeg", txt: `Uy, ¡vaya que eres directo, <b>${primerNombre}</b>! ¿Y para qué quieres invitarme a comer si apenas nos conocemos?`, showOptions: 5 }
                ];
                avanzarDialogo();
            }

            function iniciarCita_Aprender() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_curiosa.png", txt: "¿Cómo qué cosas quieres aprender de mí?", showOptions: 8 }
                ];
                avanzarDialogo();
            }

            function iniciarAprender_Bailar() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "TU_IMAGEN_MELODIE_PENSATIVA.png", txt: "¿Ok?" },
                    { img: "TU_IMAGEN_MELODIE_CURIOSA.png", txt: "¿A bailar conmigo o quieres aprender algunos pasos?", showOptions: 9 }
                ];
                avanzarDialogo();
            }

            function iniciarAprender_BrawlStars() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "TU_IMAGEN_MELODIE_SERIA.png", txt: `No es como si tuviera mucho tiempo para jugar, <b>${primerNombre}</b>.` },
                    { img: "TU_IMAGEN_MELODIE_DESPIDIENDOSE.png", txt: "Lo lamento, mañana no voy a poder ir, lindo, así que hasta la...", showOptions: 11 }
                ];
                avanzarDialogo();
            }

            function iniciarAprender_Pasos() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "TU_IMAGEN_MELODIE_FELIZ.png", txt: `Bien, <b>${primerNombre}</b>, entonces mañana por la tarde nos juntamos.` },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<i>*Intentas convencerla de que sea mañana por la mañana*</i>" },
                    { img: "TU_IMAGEN_MELODIE_DESANIMADA.png", txt: `Uf, me hubiese gustado, <b>${primerNombre}</b>, pero tengo un concierto importante mañana.` },
                    { img: "TU_IMAGEN_MELODIE_ALEGRE.png", txt: "Pero no te preocupes, si quieres te regalo esta entrada y después de mi concierto nos vamos a comer y te enseño algunos pasos para que seas una estrella en el escenario." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<i>*Recibes la entrada y le agradeces a Melodie por su tiempo, por aceptar la invitación, y le dices que mañana darás lo mejor para impresionarla*</i>" },
                    { img: "TU_IMAGEN_MELODIE_COQUETA.png", txt: "Wow, qué confiado eres. Aunque déjame decirte que no muchos me impresionan." },
                    { img: "TU_IMAGEN_MELODIE_SONROJADA.png", txt: "Aunque ver tu cara de motivado me hace recordar a un hermoso chico..." },
                    { img: "TU_IMAGEN_MELODIE_NERVIOSA.png", txt: "..." },
                    { img: "TU_IMAGEN_MELODIE_DESPIDIENDOSE.png", txt: "Uy, creo que me pasé... Nos vemos mañana, cariño. Cuídate mucho." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<b>FIN DEL CHAT:</b> Has conseguido una cita y una entrada para su concierto.", esFinal: true }
                ];
                avanzarDialogo();
            }

            function iniciarAprender_Sueno() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_Preocupada (2).jpeg", txt: `Uy, no sabría decirte la verdad, <b>${primerNombre}</b>.` },
                    { img: "Melodie_normal (2).jpeg", txt: "Sí que eres bien directo." },
                    { img: "TU_IMAGEN_MELODIE_ALEGRE.png", txt: "A ver, practiquemos una vez. Dame la mano." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<i>*Le das la mano y empiezan a bailar juntos*</i>" },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<i>*Bailan y bailan por 5 minutos, hasta que de repente Melodie se inclina y no logras sostenerla, haciendo que se caiga y choque fuertemente contra el piso*</i>" },
                    { img: "TU_IMAGEN_MELODIE_DOLOR.png", txt: "~¡AUCH!" },
                    { img: "TU_IMAGEN_MELODIE_ENOJADA.png", txt: "¡Cómo se te ocurre no poder sostenerme!", showOptions: 10 }
                ];
                avanzarDialogo();
            }

            function iniciarCaida_Perdon() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "TU_IMAGEN_MELODIE_COMPRENSIVA.png", txt: "Ay, ya, cariño, no te preocupes. Solo por hoy te perdonaré." },
                    { img: "TU_IMAGEN_MELODIE_FELIZ.png", txt: "Solo por ser sincero te acepto tu invitación, y mañana por la tarde nos vemos, ¿vale, lindo?" },
                    { img: "TU_IMAGEN_MELODIE_TIERNA.png", txt: "No te desanimes, sé que lo podrás hacer mejor ya que en la vida todos cometemos errores." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<i>*Te lanza un beso*</i>" },
                    { img: "TU_IMAGEN_MELODIE_DESPIDIENDOSE.png", txt: "Cuídate lindo." },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<b>FIN DEL CHAT:</b> Has tenido una conversación increíble con Melodie.", esFinal: true }
                ];
                avanzarDialogo();
            }

            function iniciarCaida_Pesada() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_decepcionada.jpeg", txt: "¡¡QUÉÉÉÉÉ DIJISTE!!" },
                    { img: "Melodie_decepcionada.jpeg", txt: "<i>*Le vuelves a decir que pesa mucho*</i>" },
                    { img: "Melodie_enojada.png", txt: "¿Acaso me estás diciendo gorda?" },
                    { img: "Melodie_ultra_furiosa.png", txt: "¡Cómo se te ocurre decirme así!" },
                    { img: "Melodie_ultra_furiosa.png", txt: "Sabes qué, mejor dejemos esta charla hasta aquí y no me vuelvas a buscar en tu vida. ¡¡CHAO!!" },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<b>FIN DEL CHAT:</b> Sí que te pasaste, jaja. Vuelve para la próxima.", esFinal: true }
                ];
                avanzarDialogo();
            }

            function iniciarCita_Coquetear() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
                colaDialogos = [
                    { img: "Melodie_loca.jpeg", txt: "~¡Ay, qué considerado! <i>*Grita de la emoción*</i>" },
                    { img: "Melodie_apuntando.jpeg", txt: "Pero no te llevarás mi corazón tan fácilmente, cariño." },
                    { img: "Melodie_normal (2).jpeg", txt: `Pero en fin, acepto tu invitación, <b>${primerNombre}</b>.` },
                    { img: "Melodie_normal (2).jpeg", txt: `Nos vemos mañana por la tarde, <b>${primerNombre}</b>. ¡Cuídate mucho!` },
                    { img: "TU_IMAGEN_NARRADOR.png", txt: "<b>FIN DEL CHAT:</b> ¡Has conseguido una cita impecable con Melodie!", esFinal: true }
                ];
                avanzarDialogo();
            }

            function iniciarCita_Coreana() {
                cajaOpciones.classList.add('oculta');
                esperandoOpciones = false;
