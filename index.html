<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Locuras Draco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-perfil">
        <h1>Crea tu Perfil</h1>
        <p class="subtitulo">Únete para leer los cómics de Locuras Draco</p>
        
        <form id="formulario-registro">
            <div class="grupo-input">
                <label for="nombreCompleto">Nombre y Apellido:</label>
                <input type="text" id="nombreCompleto" required placeholder="Ej: Colt Enmascarado">
            </div>

            <div class="grupo-input">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" required placeholder="tu@correo.com">
            </div>

            <!-- Selección de Avatar con Menú Desplegable -->
            <div class="grupo-input">
                <label for="selectorAvatar">Elige tu foto de perfil:</label>
                <select id="selectorAvatar" required>
                    <option value="" disabled selected>-- Haz clic aquí para elegir mi Pana --</option>
                    <option value="WhatsApp Image 2026-05-31 at 8.29.41 PM.jpeg">Locuras Draco</option>
                    <option value="WhatsApp Image 2026-05-31 at 8.29.41 PM (1).jpeg">Melodie Aesthetic</option>
                </select>
                <div id="vista-previa-avatar" class="vista-previa-oculta">
                    <img id="imagen-avatar" src="" alt="Vista previa de tu Brawler">
                </div>
            </div>

    <script src="script.js"></script>
</body>
</html>
